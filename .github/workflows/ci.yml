name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pipeline invariant tests
        run: python tests/test_pipeline.py

      - name: Citation gate (strict — fails the build on any uncited numeric claim)
        run: python -m alphathesis --data data/inp_knowledge.json --out reports --strict
